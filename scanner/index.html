<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/icon48.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="/icon128.png" />
  <link rel="apple-touch-icon" href="/icon128.png" />
  <title>Headline Odds - Bayse Market Scanner</title>
  <meta name="description" content="Browse trending Bayse markets, search live open events, and share Bayse-style market cards." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f8ff;
      --bg-soft: #edf3ff;
      --panel: #ffffff;
      --panel-strong: #f8fbff;
      --line: #dbe6ff;
      --line-strong: #c7d7ff;
      --text: #183b83;
      --text-soft: #4c6da9;
      --muted: #88a0cf;
      --bayse: #1f6cf0;
      --bayse-soft: #eef4ff;
      --yes-bg: #f2f7ff;
      --yes-line: #bdd5ff;
      --no-bg: #fff7f7;
      --no-line: #ffd0d0;
      --no-text: #ff5d5d;
      --shadow: 0 18px 40px rgba(31, 108, 240, 0.08);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, #ffffff 0%, #f5f8ff 180px, #f5f8ff 100%),
        var(--bg);
      color: var(--text);
      font-family: "Plus Jakarta Sans", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 20px 72px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 76px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .brand-label {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 26px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.05em;
      max-width: 760px;
    }

    .search-shell {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(199, 215, 255, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .search-input {
      min-height: 58px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: var(--bayse);
      box-shadow: 0 0 0 4px rgba(31, 108, 240, 0.12);
    }

    .search-btn {
      min-height: 58px;
      padding: 0 22px;
      border: none;
      border-radius: 16px;
      background: var(--bayse);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(31, 108, 240, 0.22);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .search-btn:hover {
      transform: translateY(-1px);
    }

    .search-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .search-hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin: 30px 0 14px;
    }

    .section-kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .section-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .section-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-soft);
      flex-wrap: wrap;
    }

    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .ghost-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .market-card {
      padding: 16px 18px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 14px 28px rgba(31, 108, 240, 0.06);
    }

    .market-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .market-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .market-icon,
    .market-fallback {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid #e7eeff;
      overflow: hidden;
      background: #f0f5ff;
    }

    .market-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .market-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--bayse);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .market-copy {
      min-width: 0;
    }

    .market-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.3;
    }

    .market-tag {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: #f7faff;
      border: 1px solid #e5edff;
      color: var(--bayse);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .market-rows {
      display: grid;
      gap: 0;
    }

    .market-row {
      display: grid;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #eef3ff;
    }

    .market-row:first-child {
      border-top: none;
      padding-top: 0;
    }

    .market-row:last-child {
      padding-bottom: 0;
    }

    .row-copy {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .row-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
    }

    .row-trades {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .trade-btn {
      width: 100%;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 0;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .trade-btn:hover {
      transform: translateY(-1px);
    }

    .trade-yes {
      background: var(--yes-bg);
      border-color: var(--yes-line);
      color: var(--bayse);
    }

    .trade-no {
      background: var(--no-bg);
      border-color: var(--no-line);
      color: var(--no-text);
    }

    .market-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eef3ff;
      flex-wrap: wrap;
    }

    .market-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .stat svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .market-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .share-btn,
    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .share-btn:hover,
    .open-btn:hover {
      transform: translateY(-1px);
    }

    .share-btn {
      background: var(--bayse-soft);
      border: 1px solid var(--line);
      color: var(--bayse);
    }

    .open-btn {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .status,
    .empty {
      padding: 24px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      color: var(--text-soft);
      line-height: 1.7;
    }

    .status.error {
      color: #cf4f4f;
      border-color: #ffd0d0;
      background: #fff8f8;
    }

    .loading-grid {
      display: grid;
      gap: 10px;
    }

    .skeleton-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .skeleton-line,
    .skeleton-pill,
    .skeleton-box {
      background: linear-gradient(90deg, #f2f6ff 0%, #e7efff 50%, #f2f6ff 100%);
      background-size: 200% 100%;
      animation: shimmer 1.2s linear infinite;
    }

    .skeleton-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 999px;
    }

    .skeleton-pill {
      width: 98px;
      height: 26px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .skeleton-box {
      height: 40px;
      border-radius: 0;
      border: 1px solid #e7efff;
    }

    .skeleton-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 156px 156px;
      gap: 12px;
      margin-top: 10px;
    }

    .market-expand {
      margin-top: 10px;
      border-top: 1px solid #eef3ff;
    }

    .market-expand summary {
      list-style: none;
    }

    .market-expand summary::-webkit-details-marker {
      display: none;
    }

    .market-expand-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 14px;
      color: var(--bayse);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .market-expand-toggle:hover {
      color: #1357c4;
    }

    .market-expand-label-open {
      display: none;
    }

    .market-expand[open] .market-expand-label-closed {
      display: none;
    }

    .market-expand[open] .market-expand-label-open {
      display: inline;
    }

    .market-expand-icon {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--bayse);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 180ms ease;
    }

    .market-expand-icon svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .market-expand[open] .market-expand-icon {
      transform: rotate(180deg);
    }

    .market-expand-body {
      display: grid;
      gap: 10px;
      padding-top: 10px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    footer {
      margin-top: 38px;
      padding-top: 22px;
      border-top: 1px solid #e5edff;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    footer a {
      color: var(--bayse);
      font-weight: 700;
    }

    @media (max-width: 860px) {
      .row-trades {
        gap: 12px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 0 14px 56px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .section-head,
      .market-top,
      .market-foot {
        align-items: flex-start;
        flex-direction: column;
      }

      .section-title {
        font-size: 28px;
      }

      .brand-label {
        font-size: 19px;
      }

      .skeleton-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .market-card {
        padding: 14px;
      }

      .market-top {
        gap: 12px;
      }

      .row-trades {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .trade-btn {
        min-height: 40px;
        padding: 0 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="/scanner/assets/headline-odds-mark.jpg" alt="" />
        </span>
        <span class="brand-label">Bayse Market Scanner</span>
      </div>
    </nav>

    <section class="hero">
      <h1>Browse trending Bayse events and jump straight into the exact market.</h1>

      <div class="search-shell">
        <div class="search-row">
          <input
            type="text"
            class="search-input"
            id="headlineInput"
            placeholder="Search Bayse topics - e.g. Super Eagles, Davido, Naira, Kenya election"
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">Search Bayse</button>
        </div>
        <p class="search-hint">Leave the search empty and press enter to go back to trending Bayse markets.</p>
      </div>
    </section>

    <section>
      <div class="section-head">
        <div>
          <div class="section-kicker" id="sectionKicker">Trending now</div>
          <h2 class="section-title" id="sectionTitle">Trending on Bayse</h2>
        </div>
        <div class="section-meta">
          <span id="sectionMeta">Loading open markets...</span>
          <button class="ghost-btn" id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>

      <div id="resultsArea"></div>
    </section>

    <footer>
      Built by <a href="https://headlineodds.fun">Headline Odds</a> with live Bayse market data.
    </footer>
  </div>

  <script>
    const INSTALL_URL = "https://www.bayse.markets/trade";
    const EXPANDED_MARKET_LIMIT = 3;
    const input = document.getElementById("headlineInput");
    const searchBtn = document.getElementById("searchBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const results = document.getElementById("resultsArea");
    const sectionKicker = document.getElementById("sectionKicker");
    const sectionTitle = document.getElementById("sectionTitle");
    const sectionMeta = document.getElementById("sectionMeta");

    function esc(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function toNumber(value, fallback = null) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function formatNumber(value, fractionDigits = 1) {
      if (value == null || !Number.isFinite(Number(value))) return null;
      const amount = Number(value);
      return new Intl.NumberFormat("en-US", {
        notation: amount >= 1000 ? "compact" : "standard",
        maximumFractionDigits: amount >= 1000 ? fractionDigits : amount >= 100 ? 0 : 2,
      }).format(amount);
    }

    function formatNairaPrice(value) {
      const amount = toNumber(value);
      if (amount == null) return "--";
      return `N${Math.round(amount)}`;
    }

    function formatOddsPercent(value) {
      const amount = toNumber(value);
      if (amount == null) return null;
      return `${Math.round(amount)}%`;
    }

    function formatTrades(value) {
      const formatted = formatNumber(value, 1);
      return formatted ? `${formatted} Trades` : null;
    }

    function formatLiquidity(value) {
      const formatted = formatNumber(value, 1);
      return formatted ? `N${formatted}` : null;
    }

    function formatEndsLabel(event) {
      const closeValue = event.close_time || event.resolution_date || event.closing_date;
      if (!closeValue) {
        return event.type === "COMBINED_MARKETS" ? "Ends by outcome" : "Open market";
      }

      const closeDate = new Date(closeValue);
      if (Number.isNaN(closeDate.getTime())) {
        return "Open market";
      }

      return `Ends ${closeDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;
    }

    function formatRowReturn(price) {
      if (price == null || !Number.isFinite(Number(price)) || Number(price) <= 0) return null;
      const payout = Math.round((10 / Number(price)) * 100);
      return `N10 -> N${payout}`;
    }

    function formatEventMeta(event) {
      const parts = [];
      const trades = formatTrades(event.total_orders);
      const liquidity = formatLiquidity(event.liquidity);
      if (trades) parts.push(trades);
      if (liquidity) parts.push(`${liquidity} Liquidity`);
      return parts.join(" · ") || "Open Bayse market";
    }

    function getMarketRowTitle(event, market) {
      const marketTitle = market.market_title || market.title || "";
      if ((event.markets || []).length <= 1) return "";
      if (!marketTitle || marketTitle === event.title) return "";
      return marketTitle;
    }

    function getMarketOddsValue(market) {
      const outcome1 = toNumber(market.outcome1_display, -1);
      if (outcome1 >= 0) return outcome1;

      const outcome2 = toNumber(market.outcome2_display, -1);
      return outcome2 >= 0 ? 100 - outcome2 : -1;
    }

    function sortMarketsByOdds(markets = []) {
      return [...markets].sort((left, right) => {
        const oddsDiff = getMarketOddsValue(right) - getMarketOddsValue(left);
        if (oddsDiff) return oddsDiff;

        const ordersDiff = toNumber(right.total_orders, 0) - toNumber(left.total_orders, 0);
        if (ordersDiff) return ordersDiff;

        return String(left.market_title || left.title || "").localeCompare(String(right.market_title || right.title || ""));
      });
    }

    function getOrderedMarkets(event) {
      const markets = Array.isArray(event.markets) ? event.markets : [];
      return markets.length > EXPANDED_MARKET_LIMIT ? sortMarketsByOdds(markets) : [...markets];
    }

    function getExpandableMarketLabel(event, count) {
      const noun = event.category === "POLITICS"
        ? (count === 1 ? "candidate" : "candidates")
        : (count === 1 ? "option" : "options");
      return `${count} more ${noun}`;
    }

    function renderMarketRows(event, markets) {
      return markets.map(market => {
        const rowTitle = getMarketRowTitle(event, market);
        const yesPrice = formatNairaPrice(market.outcome1_display);
        const noPrice = formatNairaPrice(market.outcome2_display);

        return `
          <div class="market-row">
            ${rowTitle ? `<div class="row-copy"><div class="row-title">${esc(rowTitle)}</div></div>` : ""}
            <div class="row-trades">
              <a class="trade-btn trade-yes" href="${esc(market.yes_url || market.url || event.url || INSTALL_URL)}" target="_blank" rel="noopener">
                Buy ${esc(market.outcome1_label || "Yes")} - ${esc(yesPrice)}
              </a>
              <a class="trade-btn trade-no" href="${esc(market.no_url || market.url || event.url || INSTALL_URL)}" target="_blank" rel="noopener">
                Buy ${esc(market.outcome2_label || "No")} - ${esc(noPrice)}
              </a>
            </div>
          </div>`;
      }).join("");
    }

    function renderExpandedMarkets(event, markets) {
      if (!markets.length) return "";

      const label = esc(getExpandableMarketLabel(event, markets.length));
      return `
        <details class="market-expand">
          <summary class="market-expand-toggle">
            <span>
              <span class="market-expand-label-closed">Show ${label}</span>
              <span class="market-expand-label-open">Hide ${label}</span>
            </span>
            <span class="market-expand-icon" aria-hidden="true">
              <svg viewBox="0 0 12 12">
                <path d="M2 4.5 6 8l4-3.5"></path>
              </svg>
            </span>
          </summary>
          <div class="market-expand-body">${renderMarketRows(event, markets)}</div>
        </details>`;
    }

    function getImageMarkup(event) {
      const imageUrl = event.image_128_url || event.image_url;
      if (imageUrl) {
        return `<span class="market-icon"><img src="${esc(imageUrl)}" alt="${esc(event.title)}" loading="lazy" /></span>`;
      }

      const fallback = (event.title || "Bayse")
        .split(/\s+/)
        .slice(0, 2)
        .map(word => word[0] || "")
        .join("")
        .toUpperCase();

      return `<span class="market-fallback">${esc(fallback || "BY")}</span>`;
    }

    function buildShareRows(event) {
      return (event.markets || []).slice(0, 5).map(market => ({
        title: getMarketRowTitle(event, market),
        yesLabel: market.outcome1_label || "Yes",
        yesPrice: formatNairaPrice(market.outcome1_display),
        noLabel: market.outcome2_label || "No",
        noPrice: formatNairaPrice(market.outcome2_display),
      }));
    }

    function buildBayseShare(event) {
      const orderedMarkets = getOrderedMarkets(event);
      const primaryMarket = orderedMarkets[0] || null;
      const primaryRow = buildShareRows(event)[0] || {
        title: "",
        yesLabel: "Yes",
        yesPrice: "\u2014",
        noLabel: "No",
        noPrice: "\u2014",
      };

      const params = new URLSearchParams({
        th: "b",
        t: event.title || primaryRow.title || "Bayse market",
        yp: primaryRow.yesPrice,
        np: primaryRow.noPrice,
      });

      if (primaryRow.title && primaryRow.title !== event.title) params.set("f", primaryRow.title);
      if (primaryRow.yesLabel && primaryRow.yesLabel !== "Yes") params.set("yl", primaryRow.yesLabel);
      if (primaryRow.noLabel && primaryRow.noLabel !== "No") params.set("nl", primaryRow.noLabel);
      if (event.id) params.set("e", event.id);
      else if (event.url) params.set("u", event.url);
      else params.set("u", INSTALL_URL);

      const shareLink = `${window.location.origin}/s?${params}`;
      const leadOdds = primaryMarket ? formatOddsPercent(primaryMarket.outcome1_display) : null;
      const subject = primaryRow.title
        ? `${primaryRow.title} ${leadOdds || primaryRow.yesPrice}`
        : `${primaryRow.yesLabel} ${leadOdds || primaryRow.yesPrice}`;
      const tweetText = `Market gives ${subject} odds -> ${event.title}\n\nDo you agree?\n\nvia @headlineodds`;
      return `https://x.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(shareLink)}`;
    }

    function renderLoading() {
      results.innerHTML = `
        <div class="loading-grid">
          ${Array.from({ length: 3 }).map(() => `
            <div class="skeleton-card">
              <div class="skeleton-head">
                <div style="flex:1; display:grid; gap:10px;">
                  <div class="skeleton-line" style="width: 68%;"></div>
                  <div class="skeleton-line" style="width: 42%;"></div>
                </div>
                <div class="skeleton-pill"></div>
              </div>
              <div class="skeleton-row">
                <div style="display:grid; gap:8px;">
                  <div class="skeleton-line" style="width: 56%;"></div>
                  <div class="skeleton-line" style="width: 36%;"></div>
                </div>
                <div class="skeleton-box"></div>
                <div class="skeleton-box"></div>
              </div>
            </div>`).join("")}
        </div>`;
    }

    function renderEmpty(message) {
      results.innerHTML = `<div class="empty">${message}</div>`;
    }

    function renderError(message) {
      results.innerHTML = `<div class="status error">${esc(message)}</div>`;
    }

    function renderResults(data) {
      const events = Array.isArray(data.results) ? data.results : [];
      if (!events.length) {
        renderEmpty(data.kind === "search"
          ? "No open Bayse markets matched that search yet. Try a broader keyword or go back to trending."
          : "No open Bayse markets are available right now.");
        return;
      }

      results.innerHTML = `<div class="cards">${events.map(renderEventCard).join("")}</div>`;
    }

    function renderEventCard(event) {
      const shareUrl = buildBayseShare(event);
      const stats = [
        formatTrades(event.total_orders),
        formatLiquidity(event.liquidity),
      ].filter(Boolean);

      const rowsMarkup = (event.markets || []).map(market => {
        const rowTitle = getMarketRowTitle(event, market);
        const yesPrice = formatNairaPrice(market.outcome1_display);
        const noPrice = formatNairaPrice(market.outcome2_display);
        const yesReturn = formatRowReturn(market.outcome1_display);
        const noReturn = formatRowReturn(market.outcome2_display);

        return `
          <div class="market-row">
            <div class="row-copy">
              ${rowTitle ? `<div class="row-title">${esc(rowTitle)}</div>` : ""}
              <div class="row-meta">
                ${yesReturn ? `<span>${esc(market.outcome1_label || "Yes")} return: ${esc(yesReturn)}</span>` : ""}
                ${noReturn ? `<span>${esc(market.outcome2_label || "No")} return: ${esc(noReturn)}</span>` : ""}
              </div>
            </div>
            <a class="trade-btn trade-yes" href="${esc(market.yes_url || market.url || event.url || INSTALL_URL)}" target="_blank" rel="noopener">
              Buy ${esc(market.outcome1_label || "Yes")} · ${esc(yesPrice)}
            </a>
            <a class="trade-btn trade-no" href="${esc(market.no_url || market.url || event.url || INSTALL_URL)}" target="_blank" rel="noopener">
              Buy ${esc(market.outcome2_label || "No")} · ${esc(noPrice)}
            </a>
          </div>`;
      }).join("");

      return `
        <article class="market-card">
          <div class="market-top">
            <div class="market-main">
              ${getImageMarkup(event)}
              <div class="market-copy">
                <div class="market-title">${esc(event.title)}</div>
                ${event.description ? `<div class="market-subtitle">${esc(event.description)}</div>` : ""}
              </div>
            </div>
            <span class="market-tag">${esc(event.category || "Bayse")}</span>
          </div>

          <div class="market-rows">${rowsMarkup}</div>

          <div class="market-foot">
            <div class="market-stats">
              ${stats[0] ? `<span class="stat"><svg viewBox="0 0 24 24"><path d="M4 20V10"></path><path d="M10 20V4"></path><path d="M16 20v-7"></path><path d="M22 20V8"></path></svg>${esc(stats[0])}</span>` : ""}
              ${stats[1] ? `<span class="stat"><svg viewBox="0 0 24 24"><path d="M12 1v22"></path><path d="M17 5.5a4.5 4.5 0 0 0-4.5-3.5h-1A4.5 4.5 0 0 0 7 6.5c0 2.5 2 3.5 5 4.5s5 2 5 4.5A4.5 4.5 0 0 1 12.5 20h-1A4.5 4.5 0 0 1 7 16.5"></path></svg>${esc(stats[1])}</span>` : ""}
              <span class="stat"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"></path><circle cx="12" cy="12" r="9"></circle></svg>${esc(formatEndsLabel(event))}</span>
            </div>

            <div class="market-actions">
              <a class="share-btn" href="${esc(shareUrl)}" target="_blank" rel="noopener">Share to X</a>
              <a class="open-btn" href="${esc(event.url || INSTALL_URL)}" target="_blank" rel="noopener">Open event</a>
            </div>
          </div>
        </article>`;
    }

    function updateSection(data) {
      const count = (data.bayseCount || 0).toLocaleString();
      if (data.kind === "search") {
        sectionKicker.textContent = "Search results";
        sectionTitle.textContent = data.query ? `Results for “${data.query}”` : "Bayse results";
        sectionMeta.textContent = `${count} open event${data.bayseCount === 1 ? "" : "s"} found`;
      } else {
        sectionKicker.textContent = "Trending now";
        sectionTitle.textContent = "Trending on Bayse";
        sectionMeta.textContent = `${count} open event${data.bayseCount === 1 ? "" : "s"} scanned`;
      }
    }

    function formatEventMeta(event) {
      const parts = [];
      const trades = formatTrades(event.total_orders);
      const liquidity = formatLiquidity(event.liquidity);
      if (trades) parts.push(trades);
      if (liquidity) parts.push(`${liquidity} Liquidity`);
      return parts.join(" - ") || "Open Bayse market";
    }

    function buildShareRows(event) {
      return getOrderedMarkets(event).slice(0, 5).map(market => ({
        title: getMarketRowTitle(event, market),
        yesLabel: market.outcome1_label || "Yes",
        yesPrice: formatNairaPrice(market.outcome1_display),
        yesUrl: market.yes_url || market.url || event.url || INSTALL_URL,
        noLabel: market.outcome2_label || "No",
        noPrice: formatNairaPrice(market.outcome2_display),
        noUrl: market.no_url || market.url || event.url || INSTALL_URL,
      }));
    }

    function renderEventCard(event) {
      const shareUrl = buildBayseShare(event);
      const stats = [
        formatTrades(event.total_orders),
        formatLiquidity(event.liquidity),
      ].filter(Boolean);
      const orderedMarkets = getOrderedMarkets(event);
      const primaryMarkets = orderedMarkets.slice(0, EXPANDED_MARKET_LIMIT);
      const extraMarkets = orderedMarkets.slice(EXPANDED_MARKET_LIMIT);

      return `
        <article class="market-card">
          <div class="market-top">
            <div class="market-main">
              ${getImageMarkup(event)}
              <div class="market-copy">
                <div class="market-title">${esc(event.title)}</div>
              </div>
            </div>
            <span class="market-tag">${esc(event.category || "Bayse")}</span>
          </div>

          <div class="market-rows">${renderMarketRows(event, primaryMarkets)}</div>
          ${renderExpandedMarkets(event, extraMarkets)}

          <div class="market-foot">
            <div class="market-stats">
              ${stats[0] ? `<span class="stat"><svg viewBox="0 0 24 24"><path d="M4 20V10"></path><path d="M10 20V4"></path><path d="M16 20v-7"></path><path d="M22 20V8"></path></svg>${esc(stats[0])}</span>` : ""}
              ${stats[1] ? `<span class="stat"><svg viewBox="0 0 24 24"><path d="M12 1v22"></path><path d="M17 5.5a4.5 4.5 0 0 0-4.5-3.5h-1A4.5 4.5 0 0 0 7 6.5c0 2.5 2 3.5 5 4.5s5 2 5 4.5A4.5 4.5 0 0 1 12.5 20h-1A4.5 4.5 0 0 1 7 16.5"></path></svg>${esc(stats[1])}</span>` : ""}
              <span class="stat"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"></path><circle cx="12" cy="12" r="9"></circle></svg>${esc(formatEndsLabel(event))}</span>
            </div>

            <div class="market-actions">
              <a class="share-btn" href="${esc(shareUrl)}" target="_blank" rel="noopener">Share to X</a>
              <a class="open-btn" href="${esc(event.url || INSTALL_URL)}" target="_blank" rel="noopener">Open event</a>
            </div>
          </div>
        </article>`;
    }

    function updateSection(data) {
      const count = (data.bayseCount || 0).toLocaleString();
      const plural = data.bayseCount === 1 ? "" : "s";

      if (data.kind === "search") {
        sectionKicker.textContent = "Search results";
        sectionTitle.textContent = data.query ? `Results for "${data.query}"` : "Bayse results";
        sectionMeta.textContent = `${count} open event${plural} found`;
        return;
      }

      sectionKicker.textContent = "Trending now";
      sectionTitle.textContent = "Trending on Bayse";
      sectionMeta.textContent = `${count} open event${plural} scanned`;
    }

    async function loadTrending() {
      searchBtn.disabled = true;
      searchBtn.textContent = "Loading...";
      renderLoading();

      try {
        const response = await fetch("/api/match");
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "Could not load Bayse markets");
        updateSection(data);
        renderResults(data);
      } catch (error) {
        sectionKicker.textContent = "Trending now";
        sectionTitle.textContent = "Trending on Bayse";
        sectionMeta.textContent = "Could not load open markets";
        renderError(error.message);
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "Search Bayse";
      }
    }

    async function search() {
      const headline = input.value.trim();
      if (headline.length < 2) {
        await loadTrending();
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "Searching...";
      renderLoading();

      try {
        const response = await fetch("/api/match", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ headline }),
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "Search failed");
        updateSection(data);
        renderResults(data);
      } catch (error) {
        sectionKicker.textContent = "Search results";
        sectionTitle.textContent = "Bayse search";
        sectionMeta.textContent = "Search failed";
        renderError(error.message);
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = "Search Bayse";
      }
    }

    searchBtn.addEventListener("click", search);
    refreshBtn.addEventListener("click", () => {
      if (input.value.trim().length >= 2) {
        search();
        return;
      }
      loadTrending();
    });
    input.addEventListener("keydown", event => {
      if (event.key === "Enter") search();
    });

    loadTrending();
    input.focus();
  </script>
</body>
</html>
